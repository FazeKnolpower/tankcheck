<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="transparent">
    <title>CheckJeTank</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⛽</text></svg>">
</head>
<body>
    <!-- Loading -->
    <div id="loading" class="loading">
        <div class="loading-inner">
            <div class="spinner"></div>
            <p id="loading-text">Locatie ophalen...</p>
        </div>
    </div>

    <!-- Top Bar -->
    <div class="top-bar">
        <span class="top-bar-icon">⛽</span>
        <span class="top-bar-name">CheckJeTank</span>
    </div>

    <!-- Map -->
    <div id="map"></div>

    <!-- Radius Slider -->
    <div class="slider-rail" id="slider-bar">
        <span class="slider-val" id="slider-text">5<small>min</small></span>
        <div class="slider-track">
            <input type="range" id="radius-slider" min="1" max="30" value="5" step="1" orient="vertical">
        </div>
        <span class="slider-icon">🚗</span>
    </div>

    <!-- Bottom Card -->
    <div class="bottom-card" id="bottom-card">
        <div class="fuel-selector" id="fuel-selector"></div>
        <div class="card-station">
            <div class="card-left">
                <div class="card-badge" id="card-badge">Goedkoopst</div>
                <h2 class="card-name" id="card-name">—</h2>
                <p class="card-address" id="card-address">—</p>
            </div>
            <div class="card-right">
                <div class="card-price" id="card-price">—</div>
                <div class="card-distance" id="card-distance">—</div>
            </div>
        </div>
        <div class="card-buttons">
            <a class="nav-btn flits" id="btn-flits" href="#" target="_blank">
                <span class="flits-logo">FM</span>
                <span>Flitsmeister</span>
            </a>
            <a class="nav-btn google" id="btn-google" href="#" target="_blank">
                <svg width="18" height="18" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                <span>Google Maps</span>
            </a>
            <a class="nav-btn apple" id="btn-apple" href="#" target="_blank">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/></svg>
                <span>Apple Maps</span>
            </a>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
</body>
</html>
